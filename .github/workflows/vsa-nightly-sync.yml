name: VSA Nightly Audit
on:
  schedule:
    - cron: '0 2 * * *' # Ejecutar a las 2 AM cada noche
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Generate Architecture Diagram
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: python .github/scripts/generate_diagram.py

      - name: Commit & Push Diagram
        run: |
          git config --global user.name "motercode"
          git config --global user.email "motercode@gmail.com"
          if [[ -n $(git status --porcelain docs/architecture.mmd) ]]; then
            git add docs/architecture.mmd
            git commit -m "docs: nightly architecture diagram update [skip ci]"
            git push
            echo "Diagrama actualizado."
          else
            echo "Sin cambios en la arquitectura."
          fi